name: Woki Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_web:
        description: Deploy the web build after a manual run
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: woki-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_TYPE: Release
  EM_VERSION: "5.0.1"
  EM_CACHE_FOLDER: emsdk-cache
  DAWN_RELEASE_REPO: google/dawn
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  native:
    name: native (${{ matrix.id }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux
            os: ubuntu-latest
            cc: gcc
            cxx: g++
            use_ccache: true
            dawn_suffix: ubuntu-latest-Release.tar.gz
            deps_script: scripts/ci/native-deps-linux.sh
          - id: macos
            os: macos-latest
            cc: /usr/bin/clang
            cxx: /usr/bin/clang++
            use_ccache: true
            dawn_suffix: macos-latest-Release.tar.gz
            deps_script: scripts/ci/native-deps-macos.sh
          - id: windows
            os: windows-latest
            cc: cl
            cxx: cl
            use_ccache: false
            dawn_suffix: windows-latest-Release.tar.gz
            deps_script: scripts/ci/native-deps-windows.ps1

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pwsh -File "${{ matrix.deps_script }}"
          else
            bash "${{ matrix.deps_script }}"
          fi

      - name: Enable MSVC toolchain
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache ccache
        if: matrix.use_ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.id }}-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/**', 'studio/**', 'modules/**') }}
          restore-keys: ccache-${{ matrix.id }}-

      - name: Cache FetchContent
        uses: actions/cache@v5
        with:
          path: 3rdparty/.deps
          key: fetchcontent-${{ matrix.id }}-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/Dependencies.cmake') }}
          restore-keys: fetchcontent-${{ matrix.id }}-

      - name: Download Dawn
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pwsh -File scripts/ci/download-dawn.ps1 -AssetSuffix "${{ matrix.dawn_suffix }}"
          else
            bash scripts/ci/download-dawn.sh "${{ matrix.dawn_suffix }}"
          fi

      - name: Configure, build, and test
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pwsh -File scripts/ci/native-build-windows.ps1
          else
            bash scripts/ci/native-build-unix.sh "${{ matrix.cc }}" "${{ matrix.cxx }}" \
              "$([[ "${{ matrix.use_ccache }}" == "true" ]] && echo ON || echo OFF)"
          fi

  web:
    name: web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-web-${{ env.EM_VERSION }}-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/**', 'studio/**', 'web/**') }}
          restore-keys: ccache-web-${{ env.EM_VERSION }}-

      - name: Cache emsdk
        uses: actions/cache@v5
        with:
          path: ${{ env.EM_CACHE_FOLDER }}
          key: emsdk-${{ env.EM_VERSION }}-${{ runner.os }}

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: ${{ env.EM_CACHE_FOLDER }}

      - name: Cache FetchContent
        uses: actions/cache@v5
        with:
          path: 3rdparty/.deps
          key: fetchcontent-web-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/Dependencies.cmake') }}
          restore-keys: fetchcontent-web-

      - name: Build web studio
        run: bash scripts/ci/web-build.sh

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: studio-web
          path: build-web-publish/
          if-no-files-found: error

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: web
    if: >-
      needs.web.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
      )
    timeout-minutes: 15
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: studio-web
          path: build-web-publish

      - name: Deploy to Azure Static Web Apps
        if: env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        run: |
          set +e
          npx @azure/static-web-apps-cli deploy build-web-publish \
            --deployment-token "$AZURE_STATIC_WEB_APPS_API_TOKEN" \
            --env production
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::Azure deploy failed — check AZURE_STATIC_WEB_APPS_API_TOKEN and the Static Web App configuration."
          fi

      - name: Skip deploy (missing secret)
        if: env.AZURE_STATIC_WEB_APPS_API_TOKEN == ''
        run: echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not set; skipping Azure deployment."
