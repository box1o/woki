name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_web:
        description: Deploy the web build after a manual run
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  EM_VERSION: 5.0.1
  EM_CACHE_FOLDER: emsdk-cache
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  DAWN_RELEASE_REPO: google/dawn
  VCPKG_ROOT: ${{ github.workspace }}\\.cache\\vcpkg
  VCPKG_BINARY_CACHE: ${{ github.workspace }}\\.cache\\vcpkg-bincache

jobs:
  native:
    name: native-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            cc: gcc
            cxx: g++
            use_ccache: ON
            dawn_asset_suffix: ubuntu-latest-Release.tar.gz
          - os: windows-latest
            name: windows
            cc: cl
            cxx: cl
            use_ccache: OFF
            dawn_asset_suffix: windows-latest-Release.tar.gz
          - os: macos-latest
            name: macos
            cc: clang
            cxx: clang++
            use_ccache: ON
            dawn_asset_suffix: macos-latest-Release.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        timeout-minutes: 2

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev xorg-dev ccache

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        timeout-minutes: 5
        run: brew install ccache

      - name: Cache vcpkg artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
            ${{ env.VCPKG_BINARY_CACHE }}
          key: vcpkg-x64-windows-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-x64-windows-

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 10
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_ROOT
          if (-not (Test-Path $vcpkgRoot)) {
            New-Item -ItemType Directory -Force -Path $vcpkgRoot | Out-Null
          }

          if (-not (Test-Path (Join-Path $vcpkgRoot '.git'))) {
            git clone https://github.com/microsoft/vcpkg $vcpkgRoot
          }

          if (-not (Test-Path (Join-Path $vcpkgRoot 'vcpkg.exe'))) {
            & (Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat') -disableMetrics
          }

          if (-not (Test-Path $env:VCPKG_BINARY_CACHE)) {
            New-Item -ItemType Directory -Force -Path $env:VCPKG_BINARY_CACHE | Out-Null
          }

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VCPKG_DEFAULT_BINARY_CACHE=$env:VCPKG_BINARY_CACHE" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VCPKG_BINARY_SOURCES=clear;files,$env:VCPKG_BINARY_CACHE,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          & (Join-Path $vcpkgRoot 'vcpkg.exe') install freetype:x64-windows
      - name: Cache ccache
        if: matrix.use_ccache == 'ON'
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-native-${{ matrix.os }}-${{ matrix.cc }}-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/Dependencies.cmake', 'studio/CMakeLists.txt') }}
          restore-keys: ccache-native-${{ matrix.os }}-${{ matrix.cc }}-

      - name: Cache FetchContent sources
        uses: actions/cache@v5
        with:
          path: 3rdparty/.deps
          key: fetchcontent-v2-${{ matrix.os }}-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/Dependencies.cmake') }}
          restore-keys: fetchcontent-v2-${{ matrix.os }}-

      - name: Download prebuilt Dawn (Linux / macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 5
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAWN_PREFIX="$(pwd)/3rdparty/.deps/dawn-install"
          DAWN_ARCHIVE="/tmp/dawn-prebuilt.tar.gz"
          rm -rf "$DAWN_PREFIX"
          mkdir -p "$DAWN_PREFIX"
          gh release download -R "$DAWN_RELEASE_REPO" --pattern "*${{ matrix.dawn_asset_suffix }}" --output "$DAWN_ARCHIVE"
          tar -xzf "$DAWN_ARCHIVE" -C "$DAWN_PREFIX" --strip-components=1
          DAWN_CONFIG=$(find "$DAWN_PREFIX" -path '*/cmake/Dawn/DawnConfig.cmake' | head -n 1)
          if [ -z "$DAWN_CONFIG" ]; then
            echo "Downloaded Dawn archive does not contain DawnConfig.cmake"
            exit 1
          fi
          echo "DAWN_PREFIX=$DAWN_PREFIX" >> "$GITHUB_ENV"
          echo "Dawn_DIR=$(dirname "$DAWN_CONFIG")" >> "$GITHUB_ENV"

      - name: Cache prebuilt Dawn (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: 3rdparty/.deps/dawn-install
          key: dawn-prebuilt-windows-${{ matrix.dawn_asset_suffix }}

      - name: Download prebuilt Dawn (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 5
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $dawnPrefix = Join-Path (Get-Location) '3rdparty/.deps/dawn-install'
          $dawnArchive = Join-Path $env:RUNNER_TEMP 'dawn-prebuilt.tar.gz'
          if (-not (Test-Path (Join-Path $dawnPrefix 'lib/cmake/Dawn/DawnConfig.cmake'))) {
            if (Test-Path $dawnPrefix) {
              Remove-Item -Recurse -Force $dawnPrefix
            }
            New-Item -ItemType Directory -Force -Path $dawnPrefix | Out-Null
            gh release download -R $env:DAWN_RELEASE_REPO --pattern "*${{ matrix.dawn_asset_suffix }}" --output $dawnArchive
            tar -xzf $dawnArchive -C $dawnPrefix --strip-components=1
          }
          $dawnConfig = Get-ChildItem -Path $dawnPrefix -Recurse -Filter DawnConfig.cmake | Select-Object -First 1
          if ($null -eq $dawnConfig) {
            Write-Error 'Downloaded Dawn archive does not contain DawnConfig.cmake'
          }
          "DAWN_PREFIX=$dawnPrefix" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Dawn_DIR=$($dawnConfig.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 12
        shell: bash
        run: |
          cmake -B build -S . \
            -DBUILD_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_PREFIX_PATH="$DAWN_PREFIX" \
            -DDawn_DIR="$Dawn_DIR"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 12
        shell: pwsh
        run: >
          cmake -B build -S .
          -DBUILD_TESTING=ON
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$env:DAWN_PREFIX"
          -DDawn_DIR="$env:Dawn_DIR"
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build tests
        timeout-minutes: 12
        shell: bash
        run: |
          cmake --build build --target woki_tests --config Release -j4 --verbose 2>&1 | tee build-tests.log
          BUILD_STATUS=${PIPESTATUS[0]}
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "=== BUILD FAILED (last 100 lines) ==="
            tail -n 100 build-tests.log
            exit $BUILD_STATUS
          fi

      - name: Build studio
        timeout-minutes: 18
        shell: bash
        run: |
          cmake --build build --target studio --config Release -j4 --verbose 2>&1 | tee build-studio.log
          BUILD_STATUS=${PIPESTATUS[0]}
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "=== BUILD FAILED (last 100 lines) ==="
            tail -n 100 build-studio.log
            exit $BUILD_STATUS
          fi

      - name: Test
        timeout-minutes: 5
        run: ctest --test-dir build --output-on-failure -C Release

      - name: ccache stats
        if: matrix.use_ccache == 'ON'
        run: ccache -s

  web-build:
    name: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        timeout-minutes: 2

      - name: Install deps
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-web-${{ env.EM_VERSION }}-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/Dependencies.cmake', 'studio/CMakeLists.txt', 'web/index.html') }}
          restore-keys: ccache-web-${{ env.EM_VERSION }}-

      - name: Cache emsdk
        uses: actions/cache@v5
        with:
          path: ${{ env.EM_CACHE_FOLDER }}
          key: ${{ env.EM_VERSION }}-${{ runner.os }}

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: ${{ env.EM_VERSION }}
          actions-cache-folder: ${{ env.EM_CACHE_FOLDER }}

      - name: Verify Emscripten
        run: emcc -v

      - name: Cache FetchContent sources
        uses: actions/cache@v5
        with:
          path: 3rdparty/.deps
          key: fetchcontent-web-v1-${{ hashFiles('3rdparty/CMakeLists.txt', 'cmake/Dependencies.cmake', 'studio/CMakeLists.txt') }}
          restore-keys: fetchcontent-web-v1-

      - name: Configure
        timeout-minutes: 8
        shell: bash
        run: |
          emcmake cmake -B build-web -S . \
            -DBUILD_TESTING=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build studio (web)
        timeout-minutes: 10
        shell: bash
        run: |
          cmake --build build-web --target studio -j4 --verbose 2>&1 | tee build-web.log
          BUILD_STATUS=${PIPESTATUS[0]}
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "=== BUILD FAILED (last 100 lines) ==="
            tail -n 100 build-web.log
            exit $BUILD_STATUS
          fi

      - name: Check web outputs
        shell: bash
        run: |
          test -f build-web/studio.html
          test -f build-web/studio.js
          test -f build-web/studio.wasm

      - name: Prepare web artifact
        shell: bash
        run: |
          rm -rf build-web-publish
          mkdir -p build-web-publish
          cp build-web/studio.html build-web-publish/index.html
          cp build-web/studio.js build-web-publish/
          cp build-web/studio.wasm build-web-publish/
          if [ -f build-web/studio.data ]; then
            cp build-web/studio.data build-web-publish/
          fi
          cp build-web/favicon.svg build-web-publish/

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: studio-web
          path: build-web-publish/
          if-no-files-found: error

      - name: ccache stats
        run: ccache -s

  web-deploy:
    name: web-deploy
    runs-on: ubuntu-latest
    needs: web-build
    if: >-
      needs.web-build.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_web)
      )
    env:
      AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v8
        with:
          name: studio-web
          path: build-web-publish

      - name: Deploy to Azure Static Web Apps
        if: env.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
        shell: bash
        run: |
          npx @azure/static-web-apps-cli deploy build-web-publish \
            --deployment-token "$AZURE_STATIC_WEB_APPS_API_TOKEN" \
            --env production

      - name: Skip Azure deploy (missing secret)
        if: env.AZURE_STATIC_WEB_APPS_API_TOKEN == ''
        shell: bash
        run: |
          echo "AZURE_STATIC_WEB_APPS_API_TOKEN is not set. Add it in GitHub Actions secrets to enable deployment."
