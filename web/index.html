<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>woki</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="woki-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="woki-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="shortcut icon" href="favicon.ico" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #181818;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #status {
        position: fixed;
        right: 8px;
        bottom: 8px;
        color: #888;
        font: 10px monospace;
      }

      #support {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      #support[hidden] {
        display: none;
      }

      .support-box {
        width: min(32rem, 100%);
        color: #eee;
        font: 16px/1.5 system-ui, sans-serif;
        text-align: center;
      }

      .support-icon {
        display: block;
        width: min(220px, 36vw);
        height: auto;
        margin: 0 auto 24px;
      }

      .support-box h1 {
        margin: 0 0 16px;
        font-size: 1.125rem;
        font-weight: 600;
      }

      .support-box p {
        margin: 0 0 10px;
        color: #bbb;
      }

      .support-box p:last-of-type {
        margin-bottom: 0;
      }

      .support-box a {
        color: #8ec5ff;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading…</div>

    <div id="support" hidden>
      <div class="support-box">
        <img class="support-icon" src="woki-sad.svg" alt="" />
        <h1 id="support-title"></h1>
        <p id="support-line-1"></p>
        <p id="support-line-2"></p>
        <p id="support-line-3"></p>
        <p>
          <a href="https://developer.mozilla.org/en-US/docs/Web/API/WebGPU_API" target="_blank" rel="noreferrer">
            MDN WebGPU documentation
          </a>
        </p>
      </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById('canvas');
      const status = document.getElementById('status');
      const support = document.getElementById('support');
      const supportTitle = document.getElementById('support-title');
      const supportLines = [
        document.getElementById('support-line-1'),
        document.getElementById('support-line-2'),
        document.getElementById('support-line-3'),
      ];

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(window.innerWidth * dpr));
        canvas.height = Math.max(1, Math.floor(window.innerHeight * dpr));
      }

      function showSupport(title, lines) {
        supportTitle.textContent = title;

        supportLines.forEach((element, index) => {
          const text = lines[index] || '';
          element.textContent = text;
          element.hidden = text.length === 0;
        });

        support.hidden = false;
        status.textContent = 'WebGPU unavailable';
      }

      function showWebGpuUnavailable() {
        showSupport('WebGPU is not available in this browser.', [
          'The studio could not start.',
          'Use a browser with WebGPU support, or enable it in about:config.',
        ]);
      }

      async function detectWebGpuSupport() {
        if (!('gpu' in navigator)) {
          showWebGpuUnavailable();
          return;
        }

        try {
          const adapter = await navigator.gpu.requestAdapter();
          if (!adapter) {
            showSupport('No GPU adapter found.', [
              'This browser exposes WebGPU, but no adapter is available.',
              'Check browser flags, drivers, and secure-context requirements.',
            ]);
          }
        } catch (error) {
          showWebGpuUnavailable();
        }
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      detectWebGpuSupport();

      var Module = {
        canvas: canvas,
        onAbort: function () {
          showWebGpuUnavailable();
        },
        onRuntimeInitialized: function () {
          resizeCanvas();
          support.hidden = true;
          status.textContent = 'Running';
        },
      };
    </script>

    {{{ SCRIPT }}}
  </body>
</html>
