<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>woki</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="woki-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="woki-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="shortcut icon" href="favicon.ico" />
    <style>
      html, body { margin: 0; height: 100%; background: #454550; }
      canvas { width: 100%; height: 100%; display: block; }
      #status { position: fixed; bottom: 8px; right: 8px; color: #ddd; font: 10px monospace; }
      #support {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #eee;
        font: 16px/1.5 system-ui, sans-serif;
        text-align: center;
      }
      #support[hidden] { display: none; }
      #support strong { display: block; margin-bottom: 8px; }
      #support a { color: #8ec5ff; }
    </style>
  </head>
  <body>
    <div id="status">Loading…</div>
    <div id="support" hidden>
      <strong>WebGPU is not available in this browser.</strong>
      <div id="support-message"></div>
    </div>
    <canvas id="canvas"></canvas>
    <script>
      const canvas = document.getElementById('canvas');
      const status = document.getElementById('status');
      const support = document.getElementById('support');
      const supportMessage = document.getElementById('support-message');

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(window.innerWidth * dpr));
        canvas.height = Math.max(1, Math.floor(window.innerHeight * dpr));
      }

      function showSupport(message) {
        supportMessage.innerHTML = message;
        support.hidden = false;
        status.textContent = 'WebGPU unavailable';
      }

      async function detectWebGpuSupport() {
        if (!('gpu' in navigator)) {
          showSupport(
            'Enable a browser with WebGPU support, then review ' +
            '<a href="https://developer.mozilla.org/en-US/docs/Web/API/WebGPU_API" target="_blank" rel="noreferrer">MDN WebGPU docs</a> ' +
            'and Firefox setup notes in <code>about:config</code> such as <code>dom.webgpu.enabled</code>.'
          );
          return;
        }

        try {
          const adapter = await navigator.gpu.requestAdapter();
          if (!adapter) {
            showSupport(
              'This browser exposes WebGPU, but no GPU adapter is available. ' +
              'Check browser flags, drivers, and secure-context requirements, then see the ' +
              '<a href="https://developer.mozilla.org/en-US/docs/Web/API/WebGPU_API" target="_blank" rel="noreferrer">MDN troubleshooting docs</a>.'
            );
          }
        } catch (error) {
          showSupport(
            'WebGPU initialization failed: <code>' + String(error) + '</code>. ' +
            'See the <a href="https://developer.mozilla.org/en-US/docs/Web/API/WebGPU_API" target="_blank" rel="noreferrer">MDN WebGPU docs</a> ' +
            'for browser support and setup details.'
          );
        }
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      detectWebGpuSupport();

      var Module = {
        canvas: canvas,
        onAbort: function (reason) {
          showSupport(
            'The Web build aborted: <code>' + String(reason) + '</code>. ' +
            'Review the <a href="https://developer.mozilla.org/en-US/docs/Web/API/WebGPU_API" target="_blank" rel="noreferrer">MDN WebGPU docs</a> ' +
            'and verify WebGPU is enabled in your browser.'
          );
        },
        onRuntimeInitialized: function () {
          resizeCanvas();
          status.textContent = "Running";
        }
      };
    </script>

    {{{ SCRIPT }}}
  </body>
</html>
